<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy App Maker AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:1000px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:30px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:30px;
}

.menu{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:25px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(90deg,#8b5cf6,#3b82f6);
color:white;
}

.btn:hover{
opacity:0.9;
}

.box{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:15px;
min-height:200px;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
outline:none;
}

textarea{
height:120px;
resize:none;
}

.hidden{
display:none;
}

.card{
padding:15px;
margin-top:10px;
background:rgba(255,255,255,0.08);
border-radius:10px;
cursor:pointer;
}

.card:hover{
background:rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Easy App Maker AI</h1>
<p class="subtitle">Build Website • App • Game using AI or Code</p>

<div class="menu">
<button class="btn" onclick="showAI()">🤖 AI Generate</button>
<button class="btn" onclick="showCode()">💻 Code Builder</button>
</div>

<!-- AI SECTION -->
<div id="aiBox" class="box">

<h2>🤖 AI Generator</h2>

<p>Select what you want to build:</p>

<div class="card" onclick="selectType('Website')">🌐 Website</div>
<div class="card" onclick="selectType('App')">📱 App</div>
<div class="card" onclick="selectType('Game')">🎮 Game</div>

<div id="promptBox" class="hidden">

<p style="margin-top:15px;">Describe your idea:</p>

<textarea id="prompt" placeholder="Example: Create a modern portfolio website"></textarea>

<button class="btn" onclick="generate()">Generate</button>

</div>

<div id="result"></div>

</div>

<!-- CODE BUILDER -->
<div id="codeBox" class="box hidden">

<h2>💻 Code Builder</h2>

<p>Coming in next update 🚀</p>

<p>You will be able to write:</p>
<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ul>

</div>

</div>

<script>

let selectedType = "";

function showAI(){
document.getElementById("aiBox").classList.remove("hidden");
document.getElementById("codeBox").classList.add("hidden");
}

function showCode(){
document.getElementById("aiBox").classList.add("hidden");
document.getElementById("codeBox").classList.remove("hidden");
}

function selectType(type){
selectedType = type;
document.getElementById("promptBox").classList.remove("hidden");
document.getElementById("result").innerHTML =
"<p>Selected: <b>" + type + "</b></p>";
}

function generate(){
let prompt = document.getElementById("prompt").value;

document.getElementById("result").innerHTML = `
<h3>🚀 Generating ${selectedType}...</h3>
<p><b>Your Idea:</b> ${prompt}</p>
<p style="color:#cbd5e1;">(Next step: AI will generate real code)</p>
`;
}

</script>

</body>
</html>
