<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Easy App Maker AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:1000px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:25px;
padding:40px;
box-shadow:0 0 30px rgba(0,0,0,.3);
}

.logo{
font-size:60px;
text-align:center;
margin-bottom:15px;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#d1d5db;
margin-bottom:35px;
font-size:18px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
text-align:center;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
background:rgba(255,255,255,.12);
}

.icon{
font-size:55px;
margin-bottom:15px;
}

.card h2{
margin-bottom:10px;
}

.card p{
color:#d1d5db;
line-height:1.6;
margin-bottom:20px;
}

button{
padding:14px 30px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#8b5cf6,#3b82f6);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.footer{
text-align:center;
margin-top:40px;
color:#cbd5e1;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🚀</div>

<h1>Easy App Maker AI</h1>

<p class="subtitle">
Build Websites, Apps & Games with AI or Create Them Using Code
</p>

<div class="cards">

<div class="card">

<div class="icon">🤖</div>

<h2>AI Generate</h2>

<p>
Create beautiful websites, apps and games simply by writing a prompt.
</p>

<button onclick="openAI()">
Open
</button>

</div>

<div class="card">

<div class="icon">💻</div>

<h2>Code Builder</h2>

<p>
Build your own project using HTML, CSS and JavaScript with live coding.
</p>

<button onclick="openBuilder()">
Open
</button>

</div>

</div>

<div class="footer">

Easy App Maker AI © 2026

</div>

</div>

<script>

function openAI(){

alert("AI Generator will be added in the next step.");

}

function openBuilder(){

alert("Code Builder will be added in the next step.");

}

</script>

</body>
</html>
