<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy App Maker AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
}

h1{
text-align:center;
margin-bottom:15px;
}

.menu{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:15px;
flex-wrap:wrap;
}

.btn{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:linear-gradient(90deg,#8b5cf6,#3b82f6);
color:white;
font-weight:bold;
}

.box{
background:rgba(255,255,255,0.07);
padding:18px;
border-radius:10px;
margin-top:10px;
}

.hidden{display:none;}

textarea{
width:100%;
height:150px;
margin-top:10px;
border:none;
border-radius:8px;
padding:10px;
outline:none;
resize:none;
}

iframe{
width:100%;
height:300px;
border-radius:10px;
background:white;
margin-top:10px;
}

/* tabs */
.tabs{
display:flex;
gap:10px;
margin-top:10px;
}

.tab{
flex:1;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,0.1);
}

.tab.active{
background:#3b82f6;
}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Easy App Maker AI</h1>

<div class="menu">
<button class="btn" onclick="showAI()">🤖 AI Generate</button>
<button class="btn" onclick="showCode()">💻 Code Builder</button>
</div>

<!-- AI SECTION -->
<div id="aiSection" class="box">

<h2>🤖 AI Generate</h2>

<p style="color:#cbd5e1;margin-top:5px;">
Create websites, apps and games using simple prompts.
Just select type and describe your idea.
</p>

<select id="type">
<option>Website</option>
<option>App</option>
<option>Game</option>
</select>

<textarea id="prompt" placeholder="Describe your idea..."></textarea>

<button class="btn" onclick="generateAI()">Generate</button>

<div id="aiOutput"></div>

</div>

<!-- CODE BUILDER -->
<div id="codeSection" class="box hidden">

<h2>💻 Code Builder</h2>

<p style="color:#cbd5e1;margin-top:5px;">
Write HTML, CSS and JavaScript separately and see live preview instantly.
</p>

<div class="tabs">
<div class="tab active" onclick="openTab('html')">HTML</div>
<div class="tab" onclick="openTab('css')">CSS</div>
<div class="tab" onclick="openTab('js')">JS</div>
</div>

<textarea id="htmlCode" placeholder="HTML code"></textarea>
<textarea id="cssCode" class="hidden" placeholder="CSS code"></textarea>
<textarea id="jsCode" class="hidden" placeholder="JavaScript code"></textarea>

<button class="btn" onclick="runCode()">▶ Run</button>

<iframe id="preview"></iframe>

</div>

</div>

<script>

function showAI(){
document.getElementById("aiSection").classList.remove("hidden");
document.getElementById("codeSection").classList.add("hidden");
}

function showCode(){
document.getElementById("aiSection").classList.add("hidden");
document.getElementById("codeSection").classList.remove("hidden");
}

function openTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

document.getElementById("htmlCode").classList.add("hidden");
document.getElementById("cssCode").classList.add("hidden");
document.getElementById("jsCode").classList.add("hidden");

if(tab==="html") document.getElementById("htmlCode").classList.remove("hidden");
if(tab==="css") document.getElementById("cssCode").classList.remove("hidden");
if(tab==="js") document.getElementById("jsCode").classList.remove("hidden");

}

function runCode(){

let html = document.getElementById("htmlCode").value;
let css = document.getElementById("cssCode").value;
let js = document.getElementById("jsCode").value;

let doc = document.getElementById("preview").contentWindow.document;

doc.open();
doc.write(`
<!DOCTYPE html>
<html>
<head>
<style>${css}</style>
</head>
<body>
${html}

<script>
${js}
<\/script>
</body>
</html>
`);
doc.close();

}

function generateAI(){
let type = document.getElementById("type").value;
let prompt = document.getElementById("prompt").value;

document.getElementById("aiOutput").innerHTML =
"<h3>Generating " + type + "...</h3><p>" + prompt + "</p>";
}

</script>

</body>
</html>
